version: '3.8'

# ============================================
# Agent Engine Platform - Docker Compose
# ============================================
# 基础设施配置文件 (profiles):
#   - full        : 所有服务（默认）
#   - external-db : MySQL/Redis/Milvus/ES 由外部提供
#
# 使用方式:
#   docker compose --profile full up -d           # 所有服务自托管
#   docker compose --profile external-db up -d    # 仅应用 + Neo4j（外部基础设施）
# ============================================

x-app-common: &app-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file: .env
  depends_on:
    redis:
      condition: service_healthy
      required: false
  volumes:
    - ./backend:/app
    - upload_data:/app/uploads
  restart: unless-stopped

services:
  # ========================================
  # 基础设施（自托管，可选）
  # ========================================

  mysql:
    image: mysql:8.0
    container_name: agent-engine-mysql
    profiles: ["full"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-dev_only}
      MYSQL_DATABASE: ${DB_NAME:-agent_engine}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent-engine-redis
    profiles: ["full"]
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_only} --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_only}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-standalone:
    image: milvusdb/milvus:v2.4-latest
    container_name: agent-engine-milvus
    profiles: ["full"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "127.0.0.1:${MILVUS_PORT:-19530}:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: agent-engine-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: agent-engine-es
    profiles: ["full"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms${ES_HEAP_MIN:-512m} -Xmx${ES_HEAP_MAX:-512m}"
    ports:
      - "127.0.0.1:${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # 应用服务
  # ========================================

  backend:
    <<: *app-common
    container_name: agent-engine-backend
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT:-8000} --reload

  celery-worker:
    <<: *app-common
    container_name: agent-engine-celery
    command: >
      celery -A app.celery_app worker
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}

  celery-beat:
    <<: *app-common
    container_name: agent-engine-celery-beat
    command: celery -A app.celery_app beat --loglevel=${LOG_LEVEL:-info}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-engine-frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: agent-engine-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  milvus_data:
  neo4j_data:
  es_data:
  upload_data:
